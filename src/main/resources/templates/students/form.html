<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isNew} ? 'Create Student - Student Portal' : 'Edit Student - Student Portal'">Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row min-vh-100">

        <!-- SIDEBAR -->
        <aside class="col-md-3 sidebar">
            <div class="sidebar-brand">
                <div style="width:50px;height:50px;background:linear-gradient(135deg,#87ae78,#6a9a5b);border-radius:8px;display:flex;align-items:center;justify-content:center;">
                    <i class="fas fa-graduation-cap" style="color:white;font-size:1.5rem;"></i>
                </div>
                <div>
                    <h4 style="margin:0;">Student Portal</h4>
                    <small>Management System</small>
                </div>
            </div>

            <ul class="sidebar-menu">
                <li>
                    <a href="/">
                        <i class="fas fa-home"></i><span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="/students">
                        <i class="fas fa-users"></i><span>Student List</span>
                    </a>
                </li>
                <li>
                    <a href="/students/new" class="active">
                        <i class="fas fa-user-plus"></i><span>Add Student</span>
                    </a>
                </li>
            </ul>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="col-md-9 p-5">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" style="margin-bottom:2rem;">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a href="/students"><i class="fas fa-users"></i> Students</a>
                    </li>
                    <li class="breadcrumb-item active">
                        <span th:text="${isNew} ? 'New Student' : 'Edit Student'"></span>
                    </li>
                </ol>
            </nav>

            <!-- Page Header -->
            <div style="margin-bottom:2rem;">
                <h1 style="font-size:2.2rem;font-weight:400;margin-bottom:0.4rem;">
                    <i th:class="${isNew} ? 'fas fa-user-plus' : 'fas fa-user-edit'"
                       style="color:var(--sage-500,#6a9a5b);"></i>
                    <span th:text="${isNew} ? 'Add New Student' : 'Edit Student'"></span>
                </h1>
                <p style="margin:0;">
                    <span th:if="${isNew}">Fill in the details below to register a new student.</span>
                    <span th:if="!${isNew}">Update the student information below.</span>
                </p>
            </div>

            <!-- Required fields notice -->
            <div style="
                display: flex;
                align-items: center;
                gap: 0.75rem;
                background: rgba(106,154,91,0.10);
                border: 1.5px solid rgba(106,154,91,0.35);
                border-radius: 10px;
                padding: 0.85rem 1.25rem;
                margin-bottom: 1.75rem;
                font-size: 0.9rem;
                color: #3d5a36;
                font-weight: 500;
            ">
                <i class="fas fa-info-circle" style="color:#6a9a5b;font-size:1.1rem;flex-shrink:0;"></i>
                <span>Fields marked with <strong style="color:#c0392b;">*</strong> are required.</span>
            </div>

            <!-- Form Card -->
            <div class="card" style="border-radius:16px;">
                <div class="card-body p-4">
                    <form
                        th:action="${isNew} ? @{/students} : @{/students/{id}(id=${studentDTO.id})}"
                        method="POST"
                        th:object="${studentDTO}"
                        novalidate
                    >
                        <div class="row">

                            <!-- First Name -->
                            <div class="col-md-6 mb-3">
                                <label for="firstName" class="form-label">
                                    <i class="fas fa-user"></i> First Name
                                    <span class="text-danger">*</span>
                                </label>
                                <input
                                    id="firstName"
                                    type="text"
                                    class="form-control"
                                    th:field="*{firstName}"
                                    th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                    placeholder="e.g. Jane"
                                    required
                                />
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('firstName')}">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span th:errors="*{firstName}"></span>
                                </div>
                            </div>

                            <!-- Last Name -->
                            <div class="col-md-6 mb-3">
                                <label for="lastName" class="form-label">
                                    <i class="fas fa-user"></i> Last Name
                                    <span class="text-danger">*</span>
                                </label>
                                <input
                                    id="lastName"
                                    type="text"
                                    class="form-control"
                                    th:field="*{lastName}"
                                    th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                    placeholder="e.g. Smith"
                                    required
                                />
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('lastName')}">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span th:errors="*{lastName}"></span>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">
                                    <i class="fas fa-envelope"></i> Email Address
                                    <span class="text-danger">*</span>
                                </label>
                                <input
                                    id="email"
                                    type="email"
                                    class="form-control"
                                    th:field="*{email}"
                                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                    placeholder="e.g. jane@example.com"
                                    required
                                />
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span th:errors="*{email}"></span>
                                </div>
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">
                                    <i class="fas fa-phone"></i> Phone Number
                                    <span style="color:var(--stone-400,#b8b0a4);font-size:0.8rem;font-weight:400;">(optional)</span>
                                </label>
                                <input
                                    id="phone"
                                    type="tel"
                                    class="form-control"
                                    th:field="*{phone}"
                                    th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                    placeholder="e.g. 01712345678"
                                />
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('phone')}">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span th:errors="*{phone}"></span>
                                </div>
                            </div>

                            <!-- Enrollment Date -->
                            <div class="col-md-6 mb-3">
                                <label for="enrollmentDate" class="form-label">
                                    <i class="fas fa-calendar-alt"></i> Enrollment Date
                                    <span class="text-danger">*</span>
                                </label>
                                <input
                                    id="enrollmentDate"
                                    type="date"
                                    class="form-control"
                                    th:field="*{enrollmentDate}"
                                    th:classappend="${#fields.hasErrors('enrollmentDate')} ? 'is-invalid'"
                                    required
                                />
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('enrollmentDate')}">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span th:errors="*{enrollmentDate}"></span>
                                </div>
                            </div>

                            <!-- GPA -->
                            <div class="col-md-6 mb-3">
                                <label for="gpa" class="form-label">
                                    <i class="fas fa-star"></i> GPA
                                    <span class="text-danger">*</span>
                                    <span style="color:var(--stone-400,#b8b0a4);font-size:0.8rem;font-weight:400;">(0.0 – 4.0)</span>
                                </label>
                                <input
                                    id="gpa"
                                    type="number"
                                    step="0.01"
                                    min="0"
                                    max="4"
                                    class="form-control"
                                    th:field="*{gpa}"
                                    th:classappend="${#fields.hasErrors('gpa')} ? 'is-invalid'"
                                    placeholder="e.g. 3.75"
                                    required
                                />
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('gpa')}">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span th:errors="*{gpa}"></span>
                                </div>
                            </div>

                        </div>

                        <!-- Divider -->
                        <hr style="border-color:rgba(106,154,91,0.15);margin:1.5rem 0;">

                        <!-- Action Buttons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i th:class="${isNew} ? 'fas fa-plus-circle' : 'fas fa-save'"></i>
                                <span th:text="${isNew} ? ' Create Student' : ' Save Changes'"></span>
                            </button>
                            <a href="/students" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/script.js"></script>
</body>
</html>
