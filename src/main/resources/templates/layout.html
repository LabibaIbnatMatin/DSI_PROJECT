<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title : 'Student Management System'}">Student Management</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
    
    <style th:if="${true}">
        /* Inline styles for immediate effect */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f2e 0%, #1a1a4d 50%, #0f2847 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            position: relative;
        }
        
        /* Animated background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(31, 96, 219, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(70, 150, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        main {
            position: relative;
            z-index: 1;
        }
        
        /* Navbar Styling */
        .navbar {
            background: linear-gradient(90deg, rgba(15, 15, 46, 0.95) 0%, rgba(26, 26, 77, 0.95) 100%) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(70, 150, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #469aff 0%, #1f60db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .navbar-brand i {
            margin-right: 0.5rem;
        }
        
        .nav-link {
            color: #b0b0d0 !important;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-link:hover {
            color: #469aff !important;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #469aff, #1f60db);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        /* Container */
        .container-main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            position: relative;
            z-index: 2;
        }
        
        /* Page Title */
        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #469aff 0%, #1f60db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
        }
        
        /* Alert Styling */
        .alert {
            background: rgba(70, 150, 255, 0.1) !important;
            border: 1px solid rgba(70, 150, 255, 0.3) !important;
            color: #e0e0e0 !important;
            border-radius: 10px;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.1) !important;
            border-color: rgba(16, 185, 129, 0.3) !important;
        }
        
        .alert-danger {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.3) !important;
        }
        
        /* Card Styling */
        .card-modern {
            background: linear-gradient(135deg, rgba(31, 96, 219, 0.15) 0%, rgba(70, 150, 255, 0.1) 100%);
            border: 1px solid rgba(70, 150, 255, 0.2);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
        }
        
        .card-modern:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(31, 38, 135, 0.6);
            border-color: rgba(70, 150, 255, 0.4);
        }
        
        /* Button Styling */
        .btn-primary {
            background: linear-gradient(135deg, #469aff 0%, #1f60db 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(70, 150, 255, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(70, 150, 255, 0.5);
            color: white;
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(239, 68, 68, 0.5);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(70, 150, 255, 0.2);
            border: 1px solid rgba(70, 150, 255, 0.4);
            color: #469aff;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(70, 150, 255, 0.3);
            border-color: rgba(70, 150, 255, 0.6);
            color: #469aff;
        }
        
        /* Form Styling */
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(70, 150, 255, 0.2);
            color: #e0e0e0;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(70, 150, 255, 0.6);
            color: #e0e0e0;
            box-shadow: 0 0 15px rgba(70, 150, 255, 0.2);
        }
        
        .form-control::placeholder {
            color: #707090;
        }
        
        .form-label {
            color: #b0b0d0;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .invalid-feedback {
            color: #f87171;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: block;
        }
        
        /* Footer */
        footer {
            background: rgba(15, 15, 46, 0.9);
            border-top: 1px solid rgba(70, 150, 255, 0.2);
            color: #707090;
            padding: 2rem;
            margin-top: 4rem;
            text-align: center;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.8rem;
            }
            
            .container-main {
                margin: 1rem auto;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-graduation-cap"></i>
                Student Management
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/students">
                            <i class="fas fa-list"></i> Students
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/students/new">
                            <i class="fas fa-plus-circle"></i> Add Student
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="container-main">
        <!-- Flash Messages -->
        <div th:if="${message}" th:class="'alert alert-' + ${messageType}" role="alert">
            <i th:class="'fas fa-' + (${messageType == 'success'} ? 'check-circle' : 'exclamation-circle')"></i>
            <span th:text="${message}"></span>
        </div>
        
        <!-- Page Content (to be filled by child templates) -->
        <th:block th:fragment="content"></th:block>
    </main>
    
    <!-- Footer -->
    <!-- <footer>
        <div class="container">
            <p>&copy; 2026 Student Management System. All rights reserved.</p>
        </div>
    </footer> -->
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="/js/script.js" th:src="@{/js/script.js}"></script>
</body>
</html>
